name: compatibility-releases

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - 'master'
      - 'v[0-9]+.[0-9]+'

env:
  GO_VERSION: "1.26"
  REGISTRY_VERSION: "2.8.3"

jobs:
  compatibility:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - release: v0.13.0
            expected-compatibility-version: "10"
          - release: v0.14.0
            expected-compatibility-version: "10"
          - release: v0.15.0
            expected-compatibility-version: "20"
          - release: v0.16.0
            expected-compatibility-version: "20"
          - release: v0.17.0
            expected-compatibility-version: "20"
          - release: v0.18.0
            expected-compatibility-version: "20"
          - release: v0.19.0
            expected-compatibility-version: "20"
          - release: v0.20.0
            expected-compatibility-version: "20"
          - release: v0.21.0
            expected-compatibility-version: "20"
          - release: v0.22.0
            expected-compatibility-version: "20"
          - release: v0.23.0
            expected-compatibility-version: "20"
          - release: v0.24.0
            expected-compatibility-version: "20"
          - release: v0.25.0
            expected-compatibility-version: "20"
          - release: v0.26.0
            expected-compatibility-version: "20"
          - release: v0.27.0
            expected-compatibility-version: "20"
          - release: v0.28.0
            expected-compatibility-version: "20"
          - release: v0.29.0
            expected-compatibility-version: "20"
    steps:
      -
        name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: arm64
      -
        name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "${{ env.GO_VERSION }}"
          cache: true
      -
        name: Download registry binary
        run: |
          mkdir -p .tmp/compat-bin
          registry_asset="registry_${{ env.REGISTRY_VERSION }}_linux_amd64.tar.gz"
          registry_url="https://github.com/distribution/distribution/releases/download/v${{ env.REGISTRY_VERSION }}/${registry_asset}"
          curl -fsSLo ".tmp/${registry_asset}" "${registry_url}"
          curl -fsSLo ".tmp/${registry_asset}.sha256" "${registry_url}.sha256"
          test "$(cat ".tmp/${registry_asset}.sha256")" = "$(sha256sum ".tmp/${registry_asset}" | cut -d' ' -f1)"
          tar -C .tmp/compat-bin -xzf ".tmp/${registry_asset}" registry
          chmod +x .tmp/compat-bin/registry
      -
        name: Prepare release binaries
        run: |
          mkdir -p .tmp/compat-bin
          docker pull "moby/buildkit:${{ matrix.release }}"
          cid=$(docker create "moby/buildkit:${{ matrix.release }}")
          trap 'docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT
          docker cp "$cid:/usr/bin/buildkitd" .tmp/compat-bin/buildkitd
          docker cp "$cid:/usr/bin/buildctl" .tmp/compat-bin/buildctl
          chmod +x .tmp/compat-bin/buildkitd .tmp/compat-bin/buildctl
          docker rm -f "$cid"
          trap - EXIT
          echo "$PWD/.tmp/compat-bin" >> "$GITHUB_PATH"
      -
        name: Test compatibility integration
        env:
          BUILDKIT_TEST_EXPECTED_COMPATIBILITY_VERSION: ${{ matrix.expected-compatibility-version }}
          BUILDKIT_REGISTRY_MIRROR_DIR: ${{ github.workspace }}/.tmp/compat-registry
        run: |
          mkdir -p "$BUILDKIT_REGISTRY_MIRROR_DIR"
          go test ./client -run '^TestCompatibilityIntegration/Test(Image|OCI)ExporterCompatibilityVersion/worker=(oci|containerd)$' -count=1 -v

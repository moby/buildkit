# reusable workflow
name: .test

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      cache_scope:
        required: true
        type: string
      pkgs:
        required: true
        type: string
      kinds:
        required: true
        type: string
      tags:
        required: false
        type: string
      codecov_flags:
        required: false
        type: string
      includes:
        required: false
        type: string
    secrets:
      codecov_token:
        required: false

env:
  GO_VERSION: "1.26"
  SETUP_BUILDX_VERSION: "edge"
  SETUP_BUILDKIT_IMAGE: "moby/buildkit:latest"

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      pkgs: ${{ steps.set.outputs.pkgs }}
      kinds: ${{ steps.set.outputs.kinds }}
      tags: ${{ steps.set.outputs.tags }}
      includes: ${{ steps.set.outputs.includes }}
    steps:
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          version: ${{ env.SETUP_BUILDX_VERSION }}
          driver-opts: image=${{ env.SETUP_BUILDKIT_IMAGE }}
          buildkitd-flags: --debug
      -
        name: Deps
        run: |
          npm install js-yaml
      -
        name: Set outputs
        id: set
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          INPUT_PKGS: ${{ inputs.pkgs }}
          INPUT_KINDS: ${{ inputs.kinds }}
          INPUT_TAGS: ${{ inputs.tags }}
          INPUT_INCLUDES: ${{ inputs.includes }}
        with:
          script: |
            const yaml = require('js-yaml');
            await core.group(`Set pkgs matrix`, async () => {
              const pkgs = core.getMultilineInput('pkgs');
              const matrix = pkgs.length ? pkgs : [''];
              core.info(JSON.stringify(matrix, null, 2));
              core.setOutput('pkgs', JSON.stringify(matrix));
            });
            await core.group(`Set kinds matrix`, async () => {
              const kinds = core.getMultilineInput('kinds');
              const matrix = kinds.length ? kinds : [''];
              core.info(JSON.stringify(matrix, null, 2));
              core.setOutput('kinds', JSON.stringify(matrix));
            });
            await core.group(`Set tags matrix`, async () => {
              const tags = core.getMultilineInput('tags');
              const matrix = tags.length ? tags : [''];
              core.info(JSON.stringify(matrix, null, 2));
              core.setOutput('tags', JSON.stringify(matrix));
            });
            await core.group(`Set includes`, async () => {
              const includes = yaml.load(core.getInput('includes'));
              core.info(JSON.stringify(includes, null, 2));
              core.setOutput('includes', JSON.stringify(includes ?? []));
            });
      -
        name: Build
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
        with:
          targets: integration-tests-base
          set: |
            *.cache-from=type=gha,scope=${{ inputs.cache_scope }}
            *.cache-to=type=gha,scope=${{ inputs.cache_scope }},repository=${{ github.repository }},ghtoken=${{ github.token }}

  run:
    runs-on: ubuntu-24.04
    needs:
      - prepare
    env:
      TESTFLAGS: "-v --parallel=6 --timeout=30m"
      GOTESTSUM_FORMAT: "standard-verbose"
      TEST_IMAGE_BUILD: "0"
    strategy:
      fail-fast: false
      matrix:
        worker:
          - containerd
          - containerd-rootless
          - containerd-1.7
          - containerd-2.1
          - containerd-snapshotter-stargz
          - oci
          - oci-rootless
          - oci-rootless-gvisor-tap-vsock-detachnetns
          - oci-snapshotter-stargz
        pkg: ${{ fromJson(needs.prepare.outputs.pkgs) }}
        kind: ${{ fromJson(needs.prepare.outputs.kinds) }}
        tags: ${{ fromJson(needs.prepare.outputs.tags) }}
        include: ${{ fromJson(needs.prepare.outputs.includes) }}
    steps:
      -
        name: Prepare
        env:
          PKG: ${{ matrix.pkg }}
          KIND: ${{ matrix.kind }}
          WORKER: ${{ matrix.worker }}
          TAGS: ${{ matrix.tags }}
          SKIP_INTEGRATION_TESTS: ${{ matrix.skip-integration-tests }}
        run: |
          echo "TEST_REPORT_NAME=${GITHUB_JOB}-$(echo "${PKG}-${SKIP_INTEGRATION_TESTS}-${KIND}-${WORKER}-${TAGS}" | tr -dc '[:alnum:]-\n\r' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV
          testFlags="${TESTFLAGS}"
          if [ -n "$TAGS" ]; then
            testFlags="${testFlags} --tags=${TAGS}"
          fi
          if [ -n "${WORKER}" ]; then
            testFlags="${testFlags} --run=//worker=${WORKER}$"
          fi
          echo "TESTFLAGS=${testFlags}" >> $GITHUB_ENV
      -
        name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      -
        name: Expose GitHub Runtime
        uses: crazy-max/ghaction-github-runtime@04d248b84655b509d8c44dc1d6f990c879747487 # v4.0.0
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        with:
          version: ${{ env.SETUP_BUILDX_VERSION }}
          driver-opts: image=${{ env.SETUP_BUILDKIT_IMAGE }}
          buildkitd-flags: --debug
      -
        name: Build test image
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
        with:
          targets: integration-tests
          set: |
            *.cache-from=type=gha,scope=${{ inputs.cache_scope }}
        env:
          BUILDKITD_TAGS: ${{ matrix.tags }}
          TEST_COVERAGE: 1
      -
        name: Test
        run: |
          ./hack/test ${KIND}
        env:
          KIND: ${{ matrix.kind }}
          TEST_REPORT_SUFFIX: -${{ env.TEST_REPORT_NAME }}
          TEST_COVERAGE: 1
          TESTPKGS: ${{ matrix.pkg }}
          SKIP_INTEGRATION_TESTS: ${{ matrix.skip-integration-tests }}
          CACHE_FROM: type=gha,scope=${{ inputs.cache_scope }}
      -
        name: Send to Codecov
        if: always()
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          directory: ./bin/testreports
          flags: ${{ matrix.codecov_flags }}
          disable_file_fixes: true
          token: ${{ secrets.codecov_token }}  # used to upload coverage reports: https://github.com/moby/buildkit/pull/4660#issue-2142122533
      -
        name: Generate annotations
        if: always()
        uses: crazy-max/.github/.github/actions/gotest-annotations@716fd1c51a46c5d93a41d44a94b439c9ee802536 # v1.10.0
        with:
          directory: ./bin/testreports
      -
        name: Upload test reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-reports-${{ env.TEST_REPORT_NAME }}
          path: ./bin/testreports
          retention-days: 1
